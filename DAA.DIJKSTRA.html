
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pathfinding Visualizer – Dijkstra vs A*</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      min-height: 100vh;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 4px;
      color: #7eb8f7;
    }

    p.subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 16px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
      justify-content: center;
    }

    button {
      padding: 8px 18px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.85; }

    #btn-dijkstra { background: #4a90e2; color: #fff; }
    #btn-astar    { background: #27ae60; color: #fff; }
    #btn-clear    { background: #e74c3c; color: #fff; }
    #btn-reset    { background: #555; color: #fff; }

    .mode-info {
      font-size: 0.82rem;
      background: #1e1e2e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 8px 14px;
      margin-bottom: 12px;
      text-align: center;
    }

    .mode-info span { color: #7eb8f7; font-weight: bold; }

    #grid-container {
      display: grid;
      border: 2px solid #333;
      border-radius: 4px;
      user-select: none;
    }

    .cell {
      width: 28px;
      height: 28px;
      border: 1px solid #1e1e2e;
      cursor: pointer;
      transition: background 0.05s;
    }

    .cell.empty    { background: #1a1a2e; }
    .cell.wall     { background: #333355; }
    .cell.start    { background: #f39c12; }
    .cell.end      { background: #e74c3c; }
    .cell.visited  { background: #2c4a7c; }
    .cell.path     { background: #f1c40f; }

    .legend {
      display: flex;
      gap: 14px;
      margin-top: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: #aaa;
    }

    .legend-box {
      width: 16px;
      height: 16px;
      border-radius: 3px;
    }

    #status {
      margin-top: 14px;
      font-size: 0.88rem;
      color: #aaa;
      min-height: 20px;
    }

    #status .highlight { color: #7eb8f7; font-weight: bold; }
  </style>
</head>
<body>

  <h1>🗺️ Pathfinding Visualizer</h1>
  <p class="subtitle">Dijkstra's Algorithm vs A* — Click to draw walls, then run an algorithm</p>

  <div class="mode-info">
    Click on the grid to <span>draw / erase walls</span>. 
    The <span style="color:#f39c12">orange</span> cell is Start, 
    <span style="color:#e74c3c">red</span> is End. Drag to draw multiple walls.
  </div>

  <div class="controls">
    <button id="btn-dijkstra">▶ Run Dijkstra's</button>
    <button id="btn-astar">▶ Run A*</button>
    <button id="btn-clear">🧹 Clear Path</button>
    <button id="btn-reset">↺ Reset Grid</button>
  </div>

  <div id="grid-container"></div>

  <div class="legend">
    <div class="legend-item"><div class="legend-box" style="background:#f39c12"></div> Start</div>
    <div class="legend-item"><div class="legend-box" style="background:#e74c3c"></div> End</div>
    <div class="legend-item"><div class="legend-box" style="background:#333355"></div> Wall</div>
    <div class="legend-item"><div class="legend-box" style="background:#2c4a7c"></div> Visited</div>
    <div class="legend-item"><div class="legend-box" style="background:#f1c40f"></div> Shortest Path</div>
  </div>

  <div id="status">Ready. Draw walls and run an algorithm.</div>

<script>
  // ── Grid Setup ──────────────────────────────────────────────
  const ROWS = 18;
  const COLS = 30;
  const ANIMATION_DELAY = 18; // ms per step

  let grid = [];         // 2D array of cell states
  let startNode = { r: 2, c: 2 };
  let endNode   = { r: 15, c: 27 };
  let isMouseDown = false;

  const gridEl   = document.getElementById('grid-container');
  const statusEl = document.getElementById('status');

  // ── Build the grid ──────────────────────────────────────────
  function buildGrid() {
    grid = [];
    gridEl.innerHTML = '';
    gridEl.style.gridTemplateColumns = `repeat(${COLS}, 28px)`;
    gridEl.style.gridTemplateRows    = `repeat(${ROWS}, 28px)`;

    for (let r = 0; r < ROWS; r++) {
      grid[r] = [];
      for (let c = 0; c < COLS; c++) {
        grid[r][c] = 'empty';
        const cell = document.createElement('div');
        cell.className = 'cell empty';
        cell.id = `cell-${r}-${c}`;
        cell.addEventListener('mousedown', () => { isMouseDown = true; toggleWall(r, c); });
        cell.addEventListener('mouseenter', () => { if (isMouseDown) toggleWall(r, c); });
        cell.addEventListener('mouseup', () => { isMouseDown = false; });
        gridEl.appendChild(cell);
      }
    }

    document.addEventListener('mouseup', () => { isMouseDown = false; });
    setCell(startNode.r, startNode.c, 'start');
    setCell(endNode.r,   endNode.c,   'end');
  }

  function setCell(r, c, state) {
    grid[r][c] = state;
    const el = document.getElementById(`cell-${r}-${c}`);
    el.className = `cell ${state}`;
  }

  function toggleWall(r, c) {
    // Don't toggle start or end
    if ((r === startNode.r && c === startNode.c) ||
        (r === endNode.r   && c === endNode.c)) return;
    const current = grid[r][c];
    setCell(r, c, current === 'wall' ? 'empty' : 'wall');
  }

  // ── Clear only visited/path cells ──────────────────────────
  function clearPath() {
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (grid[r][c] === 'visited' || grid[r][c] === 'path') {
          setCell(r, c, 'empty');
        }
      }
    }
    statusEl.innerHTML = 'Path cleared. Ready.';
  }

  // ── Neighbors ───────────────────────────────────────────────
  function getNeighbors(r, c) {
    const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
    const result = [];
    for (const [dr, dc] of dirs) {
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && grid[nr][nc] !== 'wall') {
        result.push({ r: nr, c: nc });
      }
    }
    return result;
  }

  // ── Animate results ─────────────────────────────────────────
  function animate(visitedOrder, pathNodes, algoName) {
    let i = 0;
    const interval = setInterval(() => {
      if (i < visitedOrder.length) {
        const { r, c } = visitedOrder[i];
        if (grid[r][c] === 'empty') setCell(r, c, 'visited');
        i++;
      } else {
        clearInterval(interval);
        // Draw path
        for (const { r, c } of pathNodes) {
          if (grid[r][c] !== 'start' && grid[r][c] !== 'end') {
            setCell(r, c, 'path');
          }
        }
        statusEl.innerHTML = pathNodes.length > 0
          ? `<span class="highlight">${algoName}</span> found a path! 
             Visited <span class="highlight">${visitedOrder.length}</span> cells. 
             Path length: <span class="highlight">${pathNodes.length}</span>`
          : `<span class="highlight">${algoName}</span>: No path found!`;
      }
    }, ANIMATION_DELAY);
  }

  // ── Min-Priority Queue (simple array-based) ─────────────────
  class PriorityQueue {
    constructor() { this.items = []; }
    enqueue(item, priority) {
      this.items.push({ item, priority });
      this.items.sort((a, b) => a.priority - b.priority);
    }
    dequeue() { return this.items.shift().item; }
    isEmpty() { return this.items.length === 0; }
  }

  // ── Dijkstra's Algorithm ─────────────────────────────────────
  function dijkstra() {
    clearPath();
    statusEl.innerHTML = 'Running Dijkstra\'s...';

    const dist    = Array.from({ length: ROWS }, () => Array(COLS).fill(Infinity));
    const prev    = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
    const visited = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
    const pq      = new PriorityQueue();
    const visitedOrder = [];

    const { r: sr, c: sc } = startNode;
    const { r: er, c: ec } = endNode;

    dist[sr][sc] = 0;
    pq.enqueue({ r: sr, c: sc }, 0);

    while (!pq.isEmpty()) {
      const { r, c } = pq.dequeue();
      if (visited[r][c]) continue;
      visited[r][c] = true;

      if (!(r === sr && c === sc) && !(r === er && c === ec)) {
        visitedOrder.push({ r, c });
      }

      if (r === er && c === ec) break;

      for (const nb of getNeighbors(r, c)) {
        const newDist = dist[r][c] + 1;
        if (newDist < dist[nb.r][nb.c]) {
          dist[nb.r][nb.c] = newDist;
          prev[nb.r][nb.c] = { r, c };
          pq.enqueue({ r: nb.r, c: nb.c }, newDist);
        }
      }
    }

    // Reconstruct path
    const path = [];
    let cur = { r: er, c: ec };
    while (cur && prev[cur.r][cur.c]) {
      path.unshift(cur);
      cur = prev[cur.r][cur.c];
    }

    animate(visitedOrder, path, "Dijkstra's");
  }

  // ── A* Algorithm ────────────────────────────────────────────
  function heuristic(r, c) {
    // Manhattan distance
    return Math.abs(r - endNode.r) + Math.abs(c - endNode.c);
  }

  function aStar() {
    clearPath();
    statusEl.innerHTML = 'Running A*...';

    const g    = Array.from({ length: ROWS }, () => Array(COLS).fill(Infinity));
    const prev = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
    const closed = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
    const pq   = new PriorityQueue();
    const visitedOrder = [];

    const { r: sr, c: sc } = startNode;
    const { r: er, c: ec } = endNode;

    g[sr][sc] = 0;
    pq.enqueue({ r: sr, c: sc }, heuristic(sr, sc));

    while (!pq.isEmpty()) {
      const { r, c } = pq.dequeue();
      if (closed[r][c]) continue;
      closed[r][c] = true;

      if (!(r === sr && c === sc) && !(r === er && c === ec)) {
        visitedOrder.push({ r, c });
      }

      if (r === er && c === ec) break;

      for (const nb of getNeighbors(r, c)) {
        const newG = g[r][c] + 1;
        if (newG < g[nb.r][nb.c]) {
          g[nb.r][nb.c] = newG;
          prev[nb.r][nb.c] = { r, c };
          const f = newG + heuristic(nb.r, nb.c);
          pq.enqueue({ r: nb.r, c: nb.c }, f);
        }
      }
    }

    // Reconstruct path
    const path = [];
    let cur = { r: er, c: ec };
    while (cur && prev[cur.r][cur.c]) {
      path.unshift(cur);
      cur = prev[cur.r][cur.c];
    }

    animate(visitedOrder, path, 'A*');
  }

  // ── Button Listeners ─────────────────────────────────────────
  document.getElementById('btn-dijkstra').addEventListener('click', dijkstra);
  document.getElementById('btn-astar').addEventListener('click', aStar);
  document.getElementById('btn-clear').addEventListener('click', clearPath);
  document.getElementById('btn-reset').addEventListener('click', buildGrid);

  // ── Init ─────────────────────────────────────────────────────
  buildGrid();
</script>
</body>
</html>
